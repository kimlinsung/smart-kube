<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Smart-Kube · 登录</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="login-wrap">
    <div class="login-box">
        <h1>Smart-Kube 登录</h1>
        <label>用户名</label>
        <input id="u" placeholder="admin" autofocus />
        <label>密码</label>
        <input id="p" type="password" placeholder="admin123" />
        <button id="btnLogin">登录</button>
        <button id="btnReg" style="margin-top:8px;background:#6b7280;">注册新用户</button>
        <div class="err" id="err"></div>
        <div class="switch">默认管理员账号 admin / admin123 可在 config.yaml 修改</div>
    </div>
</div>
<script src="/js/api.js"></script>
<script>
const u = document.getElementById('u');
const p = document.getElementById('p');
const err = document.getElementById('err');
async function doLogin() {
    err.textContent = '';
    try {
        await API.login(u.value.trim(), p.value);
        window.location.href = '/dashboard.html';
    } catch (e) { err.textContent = e.message; }
}
async function doReg() {
    err.textContent = '';
    try {
        await API.register(u.value.trim(), p.value);
        err.style.color = '#059669';
        err.textContent = '注册成功，已可登录';
    } catch (e) { err.style.color = '#dc2626'; err.textContent = e.message; }
}
document.getElementById('btnLogin').onclick = doLogin;
document.getElementById('btnReg').onclick = doReg;
p.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
// 已登录则直接跳转
API.me().then(()=> window.location.href = '/dashboard.html').catch(()=>{});
</script>
</body>
</html>
