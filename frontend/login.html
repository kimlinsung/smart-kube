<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>智能云边端调度系统 · 登录</title>
<link rel="stylesheet" href="/css/style.css" />
<style>
  /* 飞书登录按钮样式（不依赖外部图标库） */
  .feishu-divider {
      display: flex; align-items: center; gap: 10px;
      color: #9ca3af; font-size: 12px; margin: 14px 0 10px;
  }
  .feishu-divider::before, .feishu-divider::after {
      content: ""; flex: 1; height: 1px; background: #e5e7eb;
  }
  .btn-feishu {
      width: 100%; padding: 10px 12px; cursor: pointer;
      background: #3370ff; color: #fff; border: none; border-radius: 6px;
      font-size: 14px; display: flex; justify-content: center; align-items: center; gap: 8px;
  }
  .btn-feishu:hover { background: #1d5cff; }
  .btn-feishu[hidden] { display: none; }
  .feishu-err {
      color: #dc2626; font-size: 12px; margin-top: 8px;
      background: #fef2f2; border: 1px solid #fecaca; padding: 6px 8px; border-radius: 4px;
  }
  .feishu-err[hidden] { display: none; }
</style>
</head>
<body>
<div class="login-wrap">
    <div class="login-box">
        <h1>智能云边端调度系统</h1>
        <div class="subtitle">Cloud · Edge · Device · Unified Scheduling</div>

        <!-- 飞书登录失败提示（从 ?feishu_err= 读取） -->
        <div id="feishuErr" class="feishu-err" hidden></div>

        <label>用户名</label>
        <input id="u" placeholder="admin" autofocus />
        <label>密码</label>
        <input id="p" type="password" placeholder="admin123" />
        <button id="btnLogin">登录</button>
        <div class="err" id="err"></div>

        <!-- 飞书登录入口（仅当后端启用了飞书 OAuth 时显示） -->
        <div class="feishu-divider" id="feishuDivider" hidden>或</div>
        <button id="btnFeishu" class="btn-feishu" hidden>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M3 6.5C3 5.7 3.7 5 4.5 5h15c.8 0 1.5.7 1.5 1.5v11c0 .8-.7 1.5-1.5 1.5h-15C3.7 19 3 18.3 3 17.5v-11zm2 .5v10h14V7H5zm2 2h10v2H7V9zm0 4h7v2H7v-2z"/>
          </svg>
          使用飞书登录
        </button>

        <div class="switch">账号由管理员创建，如需开通请联系管理员</div>
    </div>
</div>
<script src="/js/api.js"></script>
<script>
const u = document.getElementById('u');
const p = document.getElementById('p');
const err = document.getElementById('err');

// 解析当前 URL 上的查询参数（?next=... &feishu_err=...）
const qs = new URLSearchParams(window.location.search);
const nextUrl = qs.get('next') || '/dashboard.html';

// 1) 飞书登录回调失败时把错误显示出来
const feishuErrText = qs.get('feishu_err');
if (feishuErrText) {
    const box = document.getElementById('feishuErr');
    box.textContent = '飞书登录失败：' + feishuErrText;
    box.hidden = false;
}

// 2) 账号密码登录（保留原逻辑）
async function doLogin() {
    err.textContent = '';
    try {
        await API.login(u.value.trim(), p.value);
        window.location.href = nextUrl;
    } catch (e) { err.textContent = e.message; }
}
document.getElementById('btnLogin').onclick = doLogin;
p.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// 3) 已登录直接跳走
API.me().then(()=> window.location.href = nextUrl).catch(()=>{});

// 4) 探测后端是否启用飞书登录；启用了就把按钮显示出来
fetch('/api/feishu/enabled', { credentials: 'include' })
    .then(r => r.json())
    .then(d => {
        if (d && d.enabled) {
            document.getElementById('feishuDivider').hidden = false;
            const btn = document.getElementById('btnFeishu');
            btn.hidden = false;
            btn.onclick = () => {
                // 跳到后端 OAuth 入口；带上 next 让后端登录成功后跳回原页面
                window.location.href = '/api/feishu/login?next=' + encodeURIComponent(nextUrl);
            };
        }
    })
    .catch(()=>{ /* 接口异常不影响账号密码登录 */ });
</script>
</body>
</html>
