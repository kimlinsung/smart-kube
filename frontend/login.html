<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>智能云边端调度系统 · 登录</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="login-wrap">
    <div class="login-box">
        <h1>智能云边端调度系统</h1>
        <label>用户名</label>
        <input id="u" placeholder="admin" autofocus />
        <label>密码</label>
        <input id="p" type="password" placeholder="admin123" />
        <button id="btnLogin">登录</button>
        <div class="err" id="err"></div>
        <div class="switch">账号由管理员创建，如需开通请联系管理员</div>
    </div>
</div>
<script src="/js/api.js"></script>
<script>
const u = document.getElementById('u');
const p = document.getElementById('p');
const err = document.getElementById('err');
async function doLogin() {
    err.textContent = '';
    try {
        await API.login(u.value.trim(), p.value);
        window.location.href = '/dashboard.html';
    } catch (e) { err.textContent = e.message; }
}
document.getElementById('btnLogin').onclick = doLogin;
p.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
// 已登录则直接跳转
API.me().then(()=> window.location.href = '/dashboard.html').catch(()=>{});
</script>
</body>
</html>
