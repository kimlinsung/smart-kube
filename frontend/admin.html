<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>智能云边端调度系统 · 集群管理</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="topbar" id="topbar"></div>
<div class="container">

    <div class="card">
        <h2>集群节点
            <button id="refreshNodes" style="float:right;font-size:12px;padding:4px 10px;border:1px solid #d1d5db;background:#fff;border-radius:4px;">刷新</button>
        </h2>
        <table>
            <thead><tr>
                <th>名称</th><th>节点类型</th><th>hostname</th><th>架构</th><th>OS</th><th>Ready</th>
                <th>IP</th><th>version</th><th>操作</th>
            </tr></thead>
            <tbody id="nodesBody"></tbody>
        </table>
    </div>

    <div class="card">
        <h2>所有用户的 Units</h2>
        <table>
            <thead><tr>
                <th>名称</th><th>所属</th><th>状态</th><th>节点类型</th><th>节点</th><th>架构</th><th>类型</th><th>操作</th>
            </tr></thead>
            <tbody id="podsBody"></tbody>
        </table>
    </div>

    <div class="card">
        <h2>用户管理</h2>
        <div style="margin-bottom:12px;font-size:13px;">
            新建用户：
            <input id="nu" placeholder="用户名" style="padding:4px 8px;border:1px solid #d1d5db;border-radius:4px;" />
            <input id="np" placeholder="密码" type="password" style="padding:4px 8px;border:1px solid #d1d5db;border-radius:4px;" />
            <select id="nr" style="padding:4px;border:1px solid #d1d5db;border-radius:4px;">
                <option value="user">普通用户</option>
                <option value="admin">管理员</option>
            </select>
            <button id="createUser" class="primary" style="padding:4px 10px;background:#2563eb;color:#fff;border:0;border-radius:4px;">创建</button>
        </div>
        <table>
            <thead><tr>
                <th>ID</th><th>用户名</th><th>角色</th><th>创建时间</th><th>操作</th>
            </tr></thead>
            <tbody id="usersBody"></tbody>
        </table>
    </div>

</div>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script src="/js/chat.js"></script>
<script>
function renderNodeRow(n) {
    const readyBadge = n.ready === 'True'
        ? '<span class="badge badge-green">Ready</span>'
        : `<span class="badge badge-red">${n.ready}</span>`;
    const cordonBadge = n.unschedulable ? ' <span class="badge badge-yellow">封锁</span>' : '';
    const cordonBtn = n.unschedulable
        ? `<button data-act="uncordon" data-name="${n.name}">解封</button>`
        : `<button data-act="cordon" data-name="${n.name}">封锁</button>`;
    return `
        <td><code>${n.name}</code></td>
        <td>${badgeNodeType(n.node_type)}</td>
        <td>${n.hostname||'-'}</td>
        <td>${n.arch||'-'}</td>
        <td>${n.os||'-'}</td>
        <td>${readyBadge}${cordonBadge}</td>
        <td>${n.internal_ip||'-'}</td>
        <td style="font-size:12px;">${n.kubelet_version||'-'}</td>
        <td class="row-actions">
            ${cordonBtn}
            <button class="danger" data-act="del" data-name="${n.name}">删除节点</button>
        </td>`;
}

async function loadNodes() {
    const body = document.getElementById('nodesBody');
    body.innerHTML = '<tr><td colspan="9">加载中...</td></tr>';
    try {
        const r = await API.adminNodes();
        body.innerHTML = '';
        groupByNodeType(r.nodes).forEach(({ type, items }) => {
            body.insertAdjacentHTML('beforeend', ntGroupHeaderHTML(type, items.length, 9));
            items.forEach(n => {
                const tr = document.createElement('tr');
                tr.innerHTML = renderNodeRow(n);
                body.appendChild(tr);
            });
        });
        if (!r.nodes.length) body.innerHTML = '<tr><td colspan="9" style="color:#6b7280">暂无节点</td></tr>';
    } catch (e) {
        body.innerHTML = `<tr><td colspan="9" style="color:#dc2626">加载失败：${e.message}</td></tr>`;
    }
}
document.getElementById('nodesBody').addEventListener('click', async e => {
    const btn = e.target.closest('button'); if (!btn) return;
    const { act, name } = btn.dataset;
    if (act === 'del') {
        if (!confirm(`确认从集群删除节点 ${name}？此操作不可逆。`)) return;
        try { await API.adminDeleteNode(name); loadNodes(); } catch (err) { alert(err.message); }
    } else if (act === 'cordon') {
        if (!confirm(`封锁节点 ${name}？封锁后不再接受新 Units 调度（现有 Units 不受影响）。`)) return;
        try { await API.adminCordonNode(name); loadNodes(); } catch (err) { alert(err.message); }
    } else if (act === 'uncordon') {
        try { await API.adminUncordonNode(name); loadNodes(); } catch (err) { alert(err.message); }
    }
});

async function loadAllPods() {
    const body = document.getElementById('podsBody');
    body.innerHTML = '<tr><td colspan="8">加载中...</td></tr>';
    try {
        const r = await API.adminPods();
        body.innerHTML = '';
        if (!r.pods.length) {
            body.innerHTML = '<tr><td colspan="8" style="color:#6b7280">暂无 Pod</td></tr>';
            return;
        }
        groupByNodeType(r.pods).forEach(({ type, items }) => {
            body.insertAdjacentHTML('beforeend', ntGroupHeaderHTML(type, items.length, 8));
            items.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><code>${p.name}</code></td>
                    <td>${p.owner_username||'-'}</td>
                    <td>${badgePhase(p.phase, p.name)}</td>
                    <td>${badgeNodeType(p.node_type)}</td>
                    <td>${p.node||'-'}</td>
                    <td>${p.arch||'-'}</td>
                    <td><span class="badge badge-blue">${p.kind||'-'}</span></td>
                    <td class="row-actions"><button class="danger" data-name="${p.name}">删除</button></td>`;
                body.appendChild(tr);
            });
        });
        bindPhaseHover(body);
    } catch (e) {
        body.innerHTML = `<tr><td colspan="8" style="color:#dc2626">${e.message}</td></tr>`;
    }
}
document.getElementById('podsBody').addEventListener('click', async e => {
    const btn = e.target.closest('button'); if (!btn) return;
    const name = btn.dataset.name;
    if (!confirm(`确认删除 Units ${name}？`)) return;
    try { await API.deleteResource(name); loadAllPods(); } catch (err) { alert(err.message); }
});

async function loadUsers() {
    const body = document.getElementById('usersBody');
    body.innerHTML = '<tr><td colspan="5">加载中...</td></tr>';
    try {
        const r = await API.adminUsers();
        body.innerHTML = '';
        r.users.forEach(u => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${u.id}</td>
                <td>${u.username}</td>
                <td><span class="badge ${u.role==='admin'?'badge-blue':'badge-green'}">${u.role}</span></td>
                <td>${fmtTime(u.created_at)}</td>
                <td class="row-actions">
                    <button data-act="pwd" data-id="${u.id}" data-name="${u.username}">重置密码</button>
                    ${u.role==='admin' ? '' : `<button class="danger" data-act="del" data-id="${u.id}">删除</button>`}
                </td>`;
            body.appendChild(tr);
        });
    } catch (e) {
        body.innerHTML = `<tr><td colspan="5" style="color:#dc2626">${e.message}</td></tr>`;
    }
}
document.getElementById('usersBody').addEventListener('click', async e => {
    const btn = e.target.closest('button'); if (!btn) return;
    const { act, id, name } = btn.dataset;
    if (act === 'del') {
        if (!confirm(`删除用户 ${name || id}？`)) return;
        try { await API.adminDeleteUser(id); loadUsers(); } catch (err) { alert(err.message); }
    } else if (act === 'pwd') {
        const newPwd = prompt(`为用户 "${name}" 设置新密码（至少 6 位）：`);
        if (newPwd === null) return;  // 点了取消
        if (newPwd.length < 6) { alert('密码长度不能少于 6 位'); return; }
        try { await API.adminChangePassword(id, newPwd); alert('密码已修改'); } catch (err) { alert(err.message); }
    }
});
document.getElementById('createUser').onclick = async () => {
    const u = document.getElementById('nu').value.trim();
    const p = document.getElementById('np').value;
    const r = document.getElementById('nr').value;
    if (!u || !p) return alert('用户名/密码不能为空');
    try {
        await API.adminCreateUser(u, p, r);
        document.getElementById('nu').value = '';
        document.getElementById('np').value = '';
        loadUsers();
    } catch (err) { alert(err.message); }
};

document.getElementById('refreshNodes').onclick = loadNodes;

(async () => {
    const me = await loadMe();
    if (me.role !== 'admin') { alert('需要管理员权限'); window.location.href = '/dashboard.html'; return; }
    loadNodes(); loadAllPods(); loadUsers();
    setInterval(loadAllPods, 15000);
})();
</script>
</body>
</html>
