<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>智能云边端调度系统 · Web Shell</title>
<link rel="stylesheet" href="/css/style.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
</head>
<body>
<div class="shell-wrap">
    <div class="shell-bar">
        <div>🖥 <span id="podName"></span></div>
        <div>
            <a href="javascript:history.back()">返回</a>
            <span id="status" style="margin-left:12px;">连接中...</span>
        </div>
    </div>
    <div id="term"></div>
</div>

<script>
const params = new URLSearchParams(location.search);
const pod = params.get('pod');
document.getElementById('podName').textContent = pod || '(未指定)';
const status = document.getElementById('status');
const termEl = document.getElementById('term');

const term = new Terminal({
    cursorBlink: true,
    fontFamily: 'ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace',
    fontSize: 13,
    theme: {
        background: '#0a0e1a',
        foreground: '#e2e8f0',
        cursor: '#e2e8f0',
        selectionBackground: '#334155',
    },
});
const fit = new FitAddon.FitAddon();
term.loadAddon(fit);
term.open(termEl);
fit.fit();
term.focus();

window.addEventListener('resize', () => { try { fit.fit(); } catch (_) {} });

if (!pod) {
    term.write('\x1b[31m缺少 pod 参数\x1b[0m\r\n');
} else {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws/shell/${encodeURIComponent(pod)}`);
    ws.binaryType = 'arraybuffer';
    const decoder = new TextDecoder('utf-8');

    ws.onopen = () => { status.textContent = '已连接'; status.style.color = '#34d399'; };
    ws.onclose = () => { status.textContent = '已断开'; status.style.color = '#f87171'; };
    ws.onerror = () => { status.textContent = '连接错误'; status.style.color = '#f87171'; };
    ws.onmessage = e => {
        const data = typeof e.data === 'string' ? e.data : decoder.decode(new Uint8Array(e.data));
        term.write(data);
    };

    term.onData(data => {
        if (ws.readyState === WebSocket.OPEN) ws.send(data);
    });
}
</script>
</body>
</html>
