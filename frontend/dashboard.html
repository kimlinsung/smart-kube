<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>智能云边端调度系统 · 我的资源</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="topbar" id="topbar"></div>
<div class="container">
    <div class="card">
        <h2>集群概览</h2>
        <div id="cluster" class="stat-row">加载中...</div>
    </div>
    <div class="card">
        <h2>我的 Units / 容器
            <button id="refresh" class="btn-sm btn-ghost">刷新</button>
        </h2>
        <table>
            <thead>
            <tr>
                <th>名称</th><th>状态</th><th>节点类型</th><th>节点</th><th>架构</th><th>镜像</th>
                <th>SSH</th><th>类型</th><th>操作</th>
            </tr>
            </thead>
            <tbody id="podsBody"><tr><td colspan="9">加载中...</td></tr></tbody>
        </table>
    </div>
</div>

<input type="file" id="hiddenUpload" style="display:none" />

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script src="/js/chat.js"></script>
<script>
let CURRENT_POD_FOR_UPLOAD = null;

async function loadCluster() {
    try {
        const c = await API.clusterInfo();
        document.getElementById('cluster').innerHTML = `
            <div class="stat"><span class="stat-label">集群版本</span><span class="stat-value">${escapeHtml(c.version)}</span></div>
            <div class="stat"><span class="stat-label">节点总数</span><span class="stat-value">${c.node_count}</span></div>
            <div class="stat"><span class="stat-label">就绪节点</span><span class="stat-value success">${c.ready_nodes}</span></div>
            <div class="stat"><span class="stat-label">命名空间</span><span class="stat-value">${escapeHtml(c.namespace)}</span></div>`;
    } catch (e) {
        document.getElementById('cluster').textContent = '加载失败：' + e.message;
    }
}

function renderPodRow(p) {
    const sshInfo = p.ssh_port
        ? `port:<b>${p.ssh_port}</b> user:${p.ssh_user||'root'} pwd:<code>${p.ssh_password||''}</code>`
        : '-';
    return `
        <td><code>${p.name}</code></td>
        <td>${badgePhase(p.phase, p.name)}</td>
        <td>${badgeNodeType(p.node_type)}</td>
        <td>${p.node||'-'}</td>
        <td>${p.arch||'-'}</td>
        <td style="font-size:12px;">${p.image||'-'}</td>
        <td style="font-size:12px;">${sshInfo}</td>
        <td><span class="badge badge-blue">${p.kind||'-'}</span></td>
        <td class="row-actions">
            <button class="primary" data-act="shell" data-name="${p.name}">Web Shell</button>
            <button data-act="upload" data-name="${p.name}">上传文件</button>
            <button class="danger" data-act="del" data-name="${p.name}">删除</button>
        </td>`;
}

async function loadPods() {
    const body = document.getElementById('podsBody');
    body.innerHTML = '<tr><td colspan="9">加载中...</td></tr>';
    try {
        const r = await API.listResources();
        if (!r.pods.length) {
            body.innerHTML = '<tr><td colspan="9" style="color:#6b7280">暂无资源，点击右下角 💬 用自然语言创建。</td></tr>';
            return;
        }
        body.innerHTML = '';
        groupByNodeType(r.pods).forEach(({ type, items }) => {
            body.insertAdjacentHTML('beforeend', ntGroupHeaderHTML(type, items.length, 9));
            items.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = renderPodRow(p);
                body.appendChild(tr);
            });
        });
        bindPhaseHover(body);
    } catch (e) {
        body.innerHTML = `<tr><td colspan="9" style="color:#dc2626">加载失败：${e.message}</td></tr>`;
    }
}

document.getElementById('podsBody').addEventListener('click', async e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const act = btn.dataset.act, name = btn.dataset.name;
    if (act === 'del') {
        if (!confirm('确认删除 ' + name + '？')) return;
        try { await API.deleteResource(name); loadPods(); } catch (err) { alert(err.message); }
    } else if (act === 'shell') {
        window.open('/shell.html?pod=' + encodeURIComponent(name), '_blank');
    } else if (act === 'upload') {
        CURRENT_POD_FOR_UPLOAD = name;
        document.getElementById('hiddenUpload').click();
    }
});

document.getElementById('hiddenUpload').onchange = async e => {
    const f = e.target.files[0];
    if (!f || !CURRENT_POD_FOR_UPLOAD) return;
    try {
        const r = await API.uploadToPod(f, CURRENT_POD_FOR_UPLOAD, '/tmp');
        alert('已上传到 Units' + r.pod_path);
    } catch (err) { alert('上传失败：' + err.message); }
    e.target.value = '';
};

document.getElementById('refresh').onclick = loadPods;
window.addEventListener('chat:done', loadPods);

(async () => {
    await loadMe();
    await loadCluster();
    await loadPods();
    setInterval(loadPods, 15000);  // 周期刷新状态
})();
</script>
</body>
</html>
